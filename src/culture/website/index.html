<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Culture in Figurative Language</title>
<style>
  :root {
    --bg: #f7f8fa;
    --card: #ffffff;
    --border: #dde1e6;
    --accent: #3b5998;
    --accent-light: #e8edf5;
    --text: #1d1d1f;
    --text-secondary: #6e6e73;
    --tag-en: #e3f0ff;
    --tag-en-border: #9dc3f7;
    --tag-zh: #fff3e0;
    --tag-zh-border: #f5c47c;
    --tag-shared: #e8f5e9;
    --tag-shared-border: #81c784;
    --danger: #c62828;
    --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }

  /* Header */
  header {
    background: var(--accent);
    color: #fff;
    padding: 18px 24px 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,.12);
  }
  header h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 12px; }
  .tabs { display: flex; gap: 4px; }
  .tab-btn {
    padding: 10px 20px;
    background: rgba(255,255,255,.15);
    border: none;
    color: rgba(255,255,255,.8);
    font-size: .9rem;
    cursor: pointer;
    border-radius: var(--radius) var(--radius) 0 0;
    transition: background .2s, color .2s;
  }
  .tab-btn.active {
    background: var(--bg);
    color: var(--text);
    font-weight: 600;
  }
  .tab-btn:hover:not(.active) { background: rgba(255,255,255,.25); }

  /* Main content */
  .container { max-width: 960px; margin: 0 auto; padding: 24px 16px; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Navigation bar */
  .nav-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .nav-bar button {
    padding: 8px 20px;
    border: 1px solid var(--border);
    background: var(--card);
    border-radius: var(--radius);
    cursor: pointer;
    font-size: .9rem;
    transition: background .15s;
  }
  .nav-bar button:hover:not(:disabled) { background: var(--accent-light); }
  .nav-bar button:disabled { opacity: .4; cursor: default; }
  .nav-counter { font-size: .85rem; color: var(--text-secondary); }

  /* Direction selector (Tab 1) */
  .direction-selector { display: flex; gap: 8px; }
  .dir-btn {
    padding: 6px 16px;
    border: 1px solid var(--border);
    background: var(--card);
    border-radius: 20px;
    cursor: pointer;
    font-size: .85rem;
    transition: all .15s;
  }
  .dir-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  /* Card */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 16px;
  }
  .card h2 {
    font-size: 1.15rem;
    margin-bottom: 4px;
  }
  .card h3 {
    font-size: 1rem;
    color: var(--text-secondary);
    font-weight: 500;
    margin-bottom: 16px;
  }

  /* Entity header */
  .entity-header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }
  .entity-en { font-size: 1.5rem; font-weight: 700; }
  .entity-zh { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
  .direction-badge {
    font-size: .75rem;
    padding: 2px 10px;
    border-radius: 12px;
    background: var(--accent-light);
    color: var(--accent);
    font-weight: 500;
  }

  /* Section blocks */
  .section { margin-bottom: 16px; }
  .section-label {
    font-size: .8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .04em;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }
  .tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: .85rem;
    line-height: 1.4;
  }
  .tag-en { background: var(--tag-en); border: 1px solid var(--tag-en-border); }
  .tag-zh { background: var(--tag-zh); border: 1px solid var(--tag-zh-border); }
  .tag-shared { background: var(--tag-shared); border: 1px solid var(--tag-shared-border); }
  .tag-neutral { background: #f0f0f0; border: 1px solid #ccc; }

  /* Bullet lists */
  .bullet-list { padding-left: 20px; }
  .bullet-list li {
    margin-bottom: 6px;
    font-size: .9rem;
  }

  /* Long text */
  .long-text {
    font-size: .9rem;
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* Expandable sections (Tab 2) */
  .expandable {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 8px;
    overflow: hidden;
  }
  .expandable-header {
    padding: 10px 16px;
    background: #fafafa;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    user-select: none;
    font-size: .9rem;
    font-weight: 500;
  }
  .expandable-header:hover { background: #f0f2f5; }
  .expandable-arrow {
    transition: transform .2s;
    font-size: .75rem;
    color: var(--text-secondary);
  }
  .expandable.open .expandable-arrow { transform: rotate(90deg); }
  .expandable-body {
    display: none;
    padding: 12px 16px;
    border-top: 1px solid var(--border);
  }
  .expandable.open .expandable-body { display: block; }

  /* Idiom card inside expandable */
  .idiom-item {
    padding: 10px 0;
    border-bottom: 1px solid #eee;
  }
  .idiom-item:last-child { border-bottom: none; }
  .idiom-name { font-weight: 600; font-size: .95rem; margin-bottom: 4px; }
  .idiom-detail { font-size: .85rem; color: var(--text-secondary); margin-left: 12px; }
  .idiom-detail strong { color: var(--text); }

  /* Shared meaning header */
  .shared-meaning-header {
    font-size: 1.2rem;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .count-badges { display: flex; gap: 10px; margin-bottom: 16px; }
  .count-badge {
    font-size: .85rem;
    padding: 4px 12px;
    border-radius: 12px;
  }

  /* Responsive */
  @media (max-width: 600px) {
    .container { padding: 12px 8px; }
    .card { padding: 16px; }
    .entity-en, .entity-zh { font-size: 1.2rem; }
  }

  /* Summary highlight */
  .summary-box {
    background: #f9f9fb;
    border-left: 3px solid var(--accent);
    padding: 14px 18px;
    border-radius: 0 var(--radius) var(--radius) 0;
    font-size: .9rem;
    line-height: 1.7;
  }
</style>
</head>
<body>

<header>
  <h1>Culture in Figurative Language: Cross-Lingual Idiom Analysis</h1>
  <div class="tabs">
    <button class="tab-btn active" data-tab="tab1">Same Entity, Different Meanings</button>
    <button class="tab-btn" data-tab="tab2">Same Meaning, Different Entities</button>
  </div>
</header>

<!-- ======================= TAB 1 ======================= -->
<div class="container">
  <div id="tab1" class="tab-content active">
    <div class="nav-bar">
      <div class="direction-selector">
        <button class="dir-btn active" data-dir="en_to_zh">EN &rarr; ZH</button>
        <button class="dir-btn" data-dir="zh_to_en">ZH &rarr; EN</button>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <button id="t1-prev" disabled>&larr; Prev</button>
        <span id="t1-counter" class="nav-counter">1 / ?</span>
        <button id="t1-next">Next &rarr;</button>
      </div>
    </div>
    <div id="t1-card"></div>
  </div>

  <!-- ======================= TAB 2 ======================= -->
  <div id="tab2" class="tab-content">
    <div class="nav-bar">
      <div></div>
      <div style="display:flex;align-items:center;gap:8px;">
        <button id="t2-prev" disabled>&larr; Prev</button>
        <span id="t2-counter" class="nav-counter">1 / ?</span>
        <button id="t2-next">Next &rarr;</button>
      </div>
    </div>
    <div id="t2-card"></div>
  </div>
</div>

<script>
// ======================== Tab switching ========================
const tabBtns = document.querySelectorAll('.tab-btn');
const tabContents = document.querySelectorAll('.tab-content');
tabBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    tabBtns.forEach(b => b.classList.remove('active'));
    tabContents.forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.tab).classList.add('active');
  });
});

// ======================== Helpers ========================
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function renderList(arr, cls) {
  if (!arr || arr.length === 0) return '<span style="color:#999">—</span>';
  return '<div class="tag-list">' + arr.map(t => `<span class="tag ${cls}">${esc(t)}</span>`).join('') + '</div>';
}

function renderBullets(arr) {
  if (!arr || arr.length === 0) return '<span style="color:#999">—</span>';
  return '<ul class="bullet-list">' + arr.map(t => `<li>${esc(t)}</li>`).join('') + '</ul>';
}

// ======================== TAB 1 Logic ========================
let tab1Data = null;
let t1Dir = 'en_to_zh';
let t1Idx = 0;

function t1CurrentList() {
  return tab1Data ? (tab1Data[t1Dir] || []) : [];
}

function renderTab1() {
  const list = t1CurrentList();
  const el = document.getElementById('t1-card');
  if (!list.length) { el.innerHTML = '<p>No data loaded.</p>'; return; }
  const r = list[t1Idx];
  document.getElementById('t1-counter').textContent = `${t1Idx + 1} / ${list.length}`;
  document.getElementById('t1-prev').disabled = t1Idx === 0;
  document.getElementById('t1-next').disabled = t1Idx >= list.length - 1;

  el.innerHTML = `
    <div class="card">
      <div class="entity-header">
        <span class="entity-en">${esc(r.entity_en)}</span>
        <span style="color:#999">/</span>
        <span class="entity-zh">${esc(r.entity_zh)}</span>
        <span class="direction-badge">${r.direction === 'en_to_zh' ? 'EN → ZH' : 'ZH → EN'}</span>
      </div>

      <div class="section">
        <div class="section-label">Matched Translations</div>
        ${renderList(r.matched_translations, 'tag-neutral')}
      </div>

      <div class="section">
        <div class="section-label">English Primary Meanings</div>
        ${renderBullets(r.en_primary_meanings)}
      </div>

      <div class="section">
        <div class="section-label">Chinese Primary Meanings</div>
        ${renderBullets(r.zh_primary_meanings)}
      </div>

      <div class="section">
        <div class="section-label">Shared Meanings</div>
        ${renderBullets(r.shared_meanings)}
      </div>

      <div class="section">
        <div class="section-label">English Unique Aspects</div>
        ${renderBullets(r.en_unique_aspects)}
      </div>

      <div class="section">
        <div class="section-label">Chinese Unique Aspects</div>
        ${renderBullets(r.zh_unique_aspects)}
      </div>

      <div class="section">
        <div class="section-label">Cultural Explanation</div>
        <div class="long-text">${esc(r.cultural_explanation)}</div>
      </div>

      <div class="section">
        <div class="section-label">Summary</div>
        <div class="summary-box">${esc(r.summary)}</div>
      </div>

      <div class="section">
        <div class="section-label">Source Idioms</div>
        <div class="expandable" id="t1-en-idioms">
          <div class="expandable-header" onclick="toggleExpand('t1-en-idioms')">
            <span>English Idioms (${(r.idioms_en || []).length})</span>
            <span class="expandable-arrow">&#9654;</span>
          </div>
          <div class="expandable-body">
            ${renderIdiomList(r.idioms_en || [], 'en')}
          </div>
        </div>
        <div class="expandable" id="t1-zh-idioms">
          <div class="expandable-header" onclick="toggleExpand('t1-zh-idioms')">
            <span>Chinese Idioms (${(r.idioms_zh || []).length})</span>
            <span class="expandable-arrow">&#9654;</span>
          </div>
          <div class="expandable-body">
            ${renderIdiomList(r.idioms_zh || [], 'zh')}
          </div>
        </div>
      </div>
    </div>
  `;
}

// Direction buttons
document.querySelectorAll('.dir-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.dir-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    t1Dir = btn.dataset.dir;
    t1Idx = 0;
    renderTab1();
  });
});

document.getElementById('t1-prev').addEventListener('click', () => { if (t1Idx > 0) { t1Idx--; renderTab1(); window.scrollTo({top: 0, behavior: 'smooth'}); } });
document.getElementById('t1-next').addEventListener('click', () => { if (t1Idx < t1CurrentList().length - 1) { t1Idx++; renderTab1(); window.scrollTo({top: 0, behavior: 'smooth'}); } });

// ======================== TAB 2 Logic ========================
let tab2Data = null;
let t2Idx = 0;

function renderIdiomList(idioms, lang) {
  if (!idioms || idioms.length === 0) return '<p style="color:#999;font-size:.85rem">No idioms</p>';
  return idioms.map(id => {
    // Support both "entity" (string, tab1) and "entities" (array, tab2)
    let entitiesHtml = '';
    if (id.entities && id.entities.length) {
      entitiesHtml = `<div class="idiom-detail"><strong>Entities:</strong> ${id.entities.map(e => esc(e)).join(', ')}</div>`;
    } else if (id.entity) {
      entitiesHtml = `<div class="idiom-detail"><strong>Entity:</strong> ${esc(id.entity)}</div>`;
    }
    const fig = id.figurative_meanings && id.figurative_meanings.length
      ? `<div class="idiom-detail"><strong>Figurative:</strong> ${id.figurative_meanings.map(m => esc(m)).join('; ')}</div>` : '';
    const lit = id.literal_meanings && id.literal_meanings.length
      ? `<div class="idiom-detail"><strong>Literal:</strong> ${id.literal_meanings.map(m => esc(m)).join('; ')}</div>` : '';
    return `<div class="idiom-item"><div class="idiom-name">${esc(id.idiom)}</div>${entitiesHtml}${fig}${lit}</div>`;
  }).join('');
}

function renderTab2() {
  if (!tab2Data || !tab2Data.length) { document.getElementById('t2-card').innerHTML = '<p>No data loaded.</p>'; return; }
  const c = tab2Data[t2Idx];
  document.getElementById('t2-counter').textContent = `${t2Idx + 1} / ${tab2Data.length}`;
  document.getElementById('t2-prev').disabled = t2Idx === 0;
  document.getElementById('t2-next').disabled = t2Idx >= tab2Data.length - 1;

  document.getElementById('t2-card').innerHTML = `
    <div class="card">
      <div class="shared-meaning-header">"${esc(c.shared_meaning)}"</div>
      <div class="count-badges">
        <span class="count-badge tag-zh">Chinese idioms: ${c.zh_idiom_count}</span>
        <span class="count-badge tag-en">English idioms: ${c.en_idiom_count}</span>
      </div>

      <div class="expandable" id="t2-zh-idioms">
        <div class="expandable-header" onclick="toggleExpand('t2-zh-idioms')">
          <span>Chinese Idioms (${c.zh_idioms.length})</span>
          <span class="expandable-arrow">&#9654;</span>
        </div>
        <div class="expandable-body">
          ${renderIdiomList(c.zh_idioms, 'zh')}
        </div>
      </div>

      <div class="expandable" id="t2-en-idioms">
        <div class="expandable-header" onclick="toggleExpand('t2-en-idioms')">
          <span>English Idioms (${c.en_idioms.length})</span>
          <span class="expandable-arrow">&#9654;</span>
        </div>
        <div class="expandable-body">
          ${renderIdiomList(c.en_idioms, 'en')}
        </div>
      </div>
    </div>
  `;
}

function toggleExpand(id) {
  document.getElementById(id).classList.toggle('open');
}

document.getElementById('t2-prev').addEventListener('click', () => { if (t2Idx > 0) { t2Idx--; renderTab2(); window.scrollTo({top: 0, behavior: 'smooth'}); } });
document.getElementById('t2-next').addEventListener('click', () => { if (t2Idx < tab2Data.length - 1) { t2Idx++; renderTab2(); window.scrollTo({top: 0, behavior: 'smooth'}); } });

// ======================== Load data ========================
const _v = 'v2';  // bump to bust browser cache after data changes
async function loadData() {
  try {
    const [r1, r2] = await Promise.all([
      fetch(`data/tab1_entity_meanings.json?${_v}`),
      fetch(`data/tab2_semantic_clusters.json?${_v}`),
    ]);
    tab1Data = await r1.json();
    tab2Data = await r2.json();
    renderTab1();
    renderTab2();
  } catch (e) {
    console.error('Failed to load data:', e);
    document.getElementById('t1-card').innerHTML = '<p style="color:red">Failed to load data. Make sure data/ files exist and serve via HTTP (not file://).</p>';
    document.getElementById('t2-card').innerHTML = '<p style="color:red">Failed to load data. Make sure data/ files exist and serve via HTTP (not file://).</p>';
  }
}
loadData();
</script>
</body>
</html>
